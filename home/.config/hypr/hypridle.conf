general {
    # This prevents duplicate hyprlock instances
    lock_cmd = bash -c 'pidof hyprlock || hyprlock; pgrep -x waybar || waybar &'
    
    # CRITICAL: This ensures lock happens BEFORE sleep
    before_sleep_cmd = loginctl lock-session
    
    # Turns screen back on after wake (avoid double-pressing keys)
    after_sleep_cmd = hyprctl dispatch dpms on && brightnessctl -r && bash -c 'pgrep -x waybar || waybar &'
    
    # Wait for hyprlock to fully initialize before sleeping
    inhibit_sleep = 3
}

# Lock screen after 5 minutes of inactivity
listener {
    timeout = 180
    on-timeout = loginctl lock-session
}

# Turn screen off after 5.5 minutes (if still idle after lock)
listener {
    timeout = 90
    on-timeout = brightnessctl -s && hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r && bash -c 'pgrep -x waybar || waybar &'
}

# Suspend after 10 minutes of inactivity
listener {
    timeout = 300
    on-timeout = systemctl suspend
}
